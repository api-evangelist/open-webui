description: >-
  Open WebUI is free open-source software (modified BSD-3-Clause). There is no hosted SaaS plan or
  per-call charge from the Open WebUI project. Cost is incurred on your own infrastructure (compute,
  storage) and on any upstream LLM backend you connect (Ollama is local; OpenAI/Anthropic/etc. bill
  per token).
notes: Self-hosted OSS; no project-level pricing. Cost is your infra + upstream LLM provider.
